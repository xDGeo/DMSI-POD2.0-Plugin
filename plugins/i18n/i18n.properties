FinishedSfcList.sfc=SFC
FinishedSfcList.quantity=Quantity
FinishedSfcList.batchNumber=Batch Number
FinishedSfcList.predecessorBatchNumber=Predecessor Batch Number
FinishedSfcList.total=Total
FinishedSfcList.loadFailed=Failed to load finished SFCs
