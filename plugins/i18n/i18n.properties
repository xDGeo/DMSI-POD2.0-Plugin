# FinishedSfcList widget
FinishedSfcList.sfc=SFC
FinishedSfcList.quantity=Quantity
FinishedSfcList.batchNumber=Batch Number
FinishedSfcList.predecessorBatchNumber=Predecessor Batch Number
FinishedSfcList.total=Total
FinishedSfcList.loadFailed=Failed to load finished SFCs
FinishedSfcList.batchLoadFailed=Failed to load batch data

# FinishedSfcList widget properties (POD Designer)
FinishedSfcList.prop.batchParameterName=Batch Parameter Name
FinishedSfcList.prop.batchParameterNameDesc=Name of the data collection parameter that holds the batch number collected against the SFC (default: BATCH).
FinishedSfcList.prop.predecessorBatchParameterName=Predecessor Batch Parameter Name
FinishedSfcList.prop.predecessorBatchParameterNameDesc=Name of the data collection parameter that holds the predecessor batch number collected against the SFC (default: IP_PREDECESSOR_BATCH).
FinishedSfcList.prop.dataCollectionGroup=Data Collection Group
FinishedSfcList.prop.dataCollectionGroupDesc=Data collection group the batch/predecessor batch parameters belong to (default: BATCH_CHARS). Leave blank to search across all groups.
FinishedSfcList.prop.dataCollectionGroupVersion=Data Collection Group Version
FinishedSfcList.prop.dataCollectionGroupVersionDesc=Version of the data collection group above (default: A). Leave blank to search across all versions.
